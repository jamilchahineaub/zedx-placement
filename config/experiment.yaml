# Sweep grid
# Both cameras always same height and radius
# Cam A fixed at azimuth 0 degrees, cam B at relative azimuth from A

heights_m:         [1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]
radii_m:           [1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]
relative_azimuths: [30, 60, 90, 120, 150, 180]

max_tilt_deg: 40.0
aim_height_m: 1.0

cam_a:
  azimuth_deg: 0
  serial:      1001
  port:        30000

cam_b:
  serial: 1002
  port:   30002

subject_positions:
  - name: center
    pos:  [0.0, 0.0, 0.0]
  - name: corner_near_A
    pos:  [-1.5, -1.5, 0.0]
  - name: corner_far
    pos:  [1.5, 1.5, 0.0]
  - name: wall_mid
    pos:  [0.0, -2.0, 0.0]

# Scene: "warehouse" (Isaac Simple_Warehouse, default) | "simple_room" (procedural).
scene_type:         warehouse
room_size_m:        [6.0, 6.0, 6.0]   # only used by simple_room
episode_duration_s: 30

# Warehouse asset. Default resolves at runtime via isaacsim get_assets_root_path()
# (needs network / Isaac assets, like the S3 character). Override with a full path
# or URL here if get_assets_root_path() is not configured, e.g.:
#   warehouse_usd: "https://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/Isaac/5.1/Isaac/Environments/Simple_Warehouse/warehouse.usd"
warehouse_usd:      ""   # "" => get_assets_root_path() + Simple_Warehouse/warehouse.usd

# Occluders placed by scene_builder.py (simple_room only; warehouse has its own clutter).
occluders:
  table:  true    # 1 x 2 x 0.8 m box at (1.2, 0, 0.4)
  pillar: true    # 0.4 m dia, 2 m tall cylinder at (-1.2, 1.0, 1.0)

# Character motion: "walk" | "inplace" | "none".
#   walk    = deterministic serpentine across the workspace box (root translates) + walk-cycle
#             limb motion. Makes detection_coverage vary by floor position -> floor-coverage maps.
#   inplace = turn/weight-shift + arm/leg articulation at the subject point (no translation).
#   none    = static.
# The SAME motion runs every layout so placements are compared fairly. Drives the existing
# UsdSkel skeleton (NOT a physics articulation); captured per-frame by gt_logger.
character_motion:   walk
motion:
  period_s:      4.0    # limb walk-cycle period (s)
  fps:           30     # animation timecodes per second (stage TimeCodesPerSecond)
  arm_deg:       35.0   # shoulder/elbow swing amplitude
  torso_deg:     20.0   # spine/neck yaw amplitude
  leg_deg:       12.0   # thigh/knee swing amplitude

# Walk path + floor-coverage grid (used by character_motion walk mode and floor_coverage.py).
workspace:
  center:   [0.0, 0.0]   # box centre on the floor (m), world X,Y
  size_m:   [5.0, 5.0]   # box extent (m): the human walks within, the heatmap spans this
grid_cell_m: 0.5         # floor-coverage cell size (5x5 box / 0.5 = 10x10 cells)
walk:
  speed_m_s:        0.8  # walking speed along the serpentine path
  serpentine_rows:  6    # number of lengthwise passes across the box (more = finer y-coverage)
  margin_m:         0.4  # keep the path this far inside the box edges
  cover_s:          90.0 # author the path over this many seconds (>= capture window)

# Path to the biped character source scene comes from machine.<name>.yaml
# (reference_scene). character_prim is the prim referenced from it.
character_prim: /World/biped_demo_meters

zed_x:
  fov_h_deg:    110.0
  fov_v_deg:     70.0
  min_range_m:    0.3
  max_range_m:   10.0

triangulable_min_deg: 40
triangulable_max_deg: 140

# --- ZED Camera Helper OmniGraph node (Phase 1, verified from ext .ogn source) ---
# Node whose uiName is "ZED Camera Helper". 2-cam port-based variant (matches test.usd).
# Source: exts/sl.sensor.camera/sl/sensor/camera/nodes/SlCameraStreamer.ogn
# Cameras are distinguished by streamingPort + cameraPrim. This node has NO serial
# field by design — serials 1001/1002 live only in zed/zed360_template.json, paired
# to ports 30000/30002. Invariant: cam A = port 30000 <-> serial 1001;
#                                   cam B = port 30002 <-> serial 1002.
zed_helper_node_type: "sl.sensor.camera.ZED_Camera"
zed_helper_node_type_version: 2

zed_stream:
  resolution: "HD1080"   # processing res (node default is HD1200)
  fps:        30          # processing fps (node default is 60)
  transport:  "BOTH"      # BOTH | NETWORK | IPC  (IPC = same machine, Linux only; SDK auto-uses SHM when BOTH/IPC)

# Exact OmniGraph attribute names on the ZED_Camera node (verified, do NOT guess).
zed_helper_attrs:
  exec_in:     "inputs:execIn"          # execution pin, from OnPlaybackTick
  camera_prim: "inputs:cameraPrim"      # type 'target' — set as USD relationship to the ZED prim
  port:        "inputs:streamingPort"   # uint, unique per camera
  model:       "inputs:cameraModel"     # token, default ZED_X
  resolution:  "inputs:resolution"      # token: HD1200 | HD1080 | SVGA
  fps:         "inputs:fps"             # uint
  transport:   "inputs:transportLayerMode"  # token: BOTH | NETWORK | IPC

# --- Layout ranking (analysis/rank.py) ---------------------------------------
# Post-processes results/results.csv to rank camera positions. Does NOT touch the
# sim. See README "Ranking". Tuned to the full warehouse+motion sweep: most layouts
# fail fusion registration (absolute MPJPE -> metres), so we (a) FLAG failures but
# keep ranking everything, (b) score on the metrics that actually carry signal, and
# (c) treat pose-fidelity and absolute-placement as separate Pareto axes.
ranking:
  # Validity FLAG (layouts are kept + ranked, just marked invalid if any threshold trips).
  validity:
    max_registration_offset_mm: 300.0     # fused<->GT global offset above this = registration failed
    max_jitter_variance:        50000.0   # ~224 mm std; above this = tracking blow-up
    coverage_floor:             0.8        # detection_coverage below this = unreliable detect

  # MPJPE goodness bands (mm): value<=good -> 1.0, value>=bad -> 0.0 (clamped, linear).
  pose_band_mm:     [20.0, 200.0]    # aligned MPJPE (true pose) acceptance band
  absolute_band_mm: [50.0, 1000.0]   # absolute MPJPE (world placement) band

  # Three axes. Each metric -> 0-1 goodness via `norm`:
  #   pose_band | absolute_band  = clamped linear band (interpretable, for the MPJPE family)
  #   rank                       = within-sweep rank (outlier-robust; for heavy-tailed metrics)
  #   asis                       = value used directly (already 0-1, higher better)
  # Within-axis weights are renormalized over the metrics present (non-NaN) each run.
  axes:
    pose_fidelity:        # calibration-invariant true pose error
      weight: 0.50
      metrics:
        mpjpe_aligned_mm: {w: 1.0, norm: pose_band}
    absolute_placement:   # world-position accuracy (includes registration offset)
      weight: 0.20
      metrics:
        mpjpe_mm: {w: 1.0, norm: absolute_band}
    stability:            # time-on-frame coverage + temporal tracking reliability
      weight: 0.30
      metrics:
        detection_coverage: {w: 0.50, norm: asis}   # time-on-frame (frames tracked / grabbed); live under walk
        id_drops:           {w: 0.25, norm: rank}
        jitter_variance:    {w: 0.25, norm: rank}

  # Axis-weight presets [pose_fidelity, absolute_placement, stability] for sensitivity.
  presets:
    balanced:  [0.50, 0.20, 0.30]
    pose:      [0.70, 0.10, 0.20]
    absolute:  [0.20, 0.60, 0.20]
    stability: [0.30, 0.10, 0.60]
